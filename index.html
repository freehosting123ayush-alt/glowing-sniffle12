<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apkdedo Admin</title>

<style>
body{
background:#0f0c29;
color:white;
font-family:sans-serif;
padding:40px;
}

input,textarea{
width:100%;
margin-bottom:15px;
padding:10px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff00c8;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h1>apkdedo Admin Panel</h1>

<input type="text" id="name" placeholder="App Name">
<input type="text" id="logo" placeholder="Logo URL">
<textarea id="description" placeholder="Description"></textarea>
<input type="text" id="url" placeholder="Download URL">
<button onclick="addApp()">Upload App</button>

<hr>

<div id="appList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDolFuHJbEifddNVCWzBFO3L-xT-QomhD8",
authDomain: "modapk-b564b.firebaseapp.com",
databaseURL: "https://modapk-b564b-default-rtdb.firebaseio.com",
projectId: "modapk-b564b",
storageBucket: "modapk-b564b.firebasestorage.app",
messagingSenderId: "269110578270",
appId: "1:269110578270:web:0d751349cc86199e7a78cf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.addApp = function(){
push(ref(db,"apps"),{
name:document.getElementById("name").value,
logo:document.getElementById("logo").value,
description:document.getElementById("description").value,
url:document.getElementById("url").value
});
alert("Uploaded!");
}

const appList = document.getElementById("appList");

onValue(ref(db,"apps"),(snapshot)=>{
appList.innerHTML="";
snapshot.forEach(child=>{
const data = child.val();
appList.innerHTML+=`
<div style="margin-bottom:15px;">
<b>${data.name}</b>
<button onclick="deleteApp('${child.key}')">Delete</button>
</div>
`;
});
});

window.deleteApp = function(id){
remove(ref(db,"apps/"+id));
}

</script>

</body>
</html>
